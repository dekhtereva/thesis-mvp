function AccentGlow({ children }) {
  return <span style={{
    background: 'linear-gradient(180deg, #ffa24a, #ff7a1a)',
    WebkitBackgroundClip: 'text',
    WebkitTextFillColor: 'transparent',
    textShadow: '0 0 40px rgba(255,122,26,0.5)'
  }}>{children}</span>;
}

function MatchDonut({ score, size = 64 }) {
  // score 0..100 → conic gradient
  const hue = score >= 85 ? '#4ade80' : score >= 70 ? '#ffb347' : score >= 55 ? '#ff7a1a' : '#78808e';
  const bg = `conic-gradient(${hue} ${score * 3.6}deg, #1e2a42 ${score * 3.6}deg 360deg)`;
  return (
    <div className="match-donut" style={{ width: size, height: size, background: bg }}>
      <span style={{ fontSize: size * 0.28 }}>{score}</span>
    </div>);

}

function MatchDonutTooltip({ score, size = 64, strong = [], gaps = [] }) {
  const [show, setShow] = React.useState(false);
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}
    onMouseEnter={() => setShow(true)}
    onMouseLeave={() => setShow(false)}>
      <MatchDonut score={score} size={size} />
      {show &&
      <div style={{
        position: 'absolute', left: size + 10, top: '50%', transform: 'translateY(-50%)',
        background: '#0d1626', border: '1px solid #2a3652', borderRadius: 10,
        padding: '12px 14px', minWidth: 200, zIndex: 999,
        boxShadow: '0 8px 32px rgba(0,0,0,0.5)'
      }}>
          <div className="mono" style={{ fontSize: 10, color: '#ffb347', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 8, fontWeight: 700 }}>Совпадение навыков</div>
          {strong.length > 0 && <React.Fragment>
            <div className="mono" style={{ fontSize: 10, color: '#8892a8', textTransform: 'uppercase', marginBottom: 5 }}>Есть у студента</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginBottom: 10 }}>
              {strong.map((s) => <span key={s} className="chip chip-match" style={{ fontSize: 11 }}>✓ {s}</span>)}
            </div>
          </React.Fragment>}
          {gaps.length > 0 && <React.Fragment>
            <div className="mono" style={{ fontSize: 10, color: '#8892a8', textTransform: 'uppercase', marginBottom: 5 }}>Стоит подтянуть</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>

          </div>
        </div>
      </div>
    </header>);

}

function FormatIcon({ format }) {
  const map = { 'Гибрид': '◑', 'Удалённо': '◯', 'Очно': '●' };
  return <span style={{ fontSize: 14, color: '#ffb347' }}>{map[format] || '●'}</span>;
}

function Toast({ message, onDone }) {
  useEffect(() => {
    if (!message) return;
    const t = setTimeout(onDone, 2600);
    return () => clearTimeout(t);
  }, [message]);
  if (!message) return null;
  return <div className="toast">{message}</div>;
}

const DOC_STATUS_MAP = {
  signed: { pill: 'pill-ok', dot: 'dot-ok', label: 'Подписано' },
  issued: { pill: 'pill-ok', dot: 'dot-ok', label: 'Выдано' },
  draft: { pill: 'pill-warn', dot: 'dot-warn', label: 'В работе' },
  pending: { pill: 'pill-info', dot: 'dot-idle', label: 'Ожидает' },

};

function DocTable({ docs, toast }) {
  const sectionTitles = { student: 'Документы студента', itmo: 'Документы ИТМО', mentor: 'Документы наставника' };
  const sections = ['student', 'itmo', 'mentor'];
  return (
    <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 160px 200px 120px 120px', padding: '12px 24px', borderBottom: '1px solid #1a2438', background: 'rgba(255,255,255,0.02)' }}>
        {['Документ', 'Ответственный', 'Статус', 'Обновлён', ''].map((h, i) =>
        <div key={i} className="mono" style={{ fontSize: 10, color: '#8892a8', textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 700 }}>{h}</div>
        )}
      </div>
      {sections.map((sec) => {
        const secDocs = docs.filter((d) => d.section === sec);
        if (!secDocs.length) return null;
        return (
          <React.Fragment key={sec}>
            <div style={{ padding: '10px 24px 6px', background: '#0a0e18', borderBottom: '1px solid #131e33' }}>
              <span className="mono" style={{ fontSize: 10, color: '#5a6278', textTransform: 'uppercase', letterSpacing: '0.1em' }}>{sectionTitles[sec]}</span>
            </div>
            {secDocs.map((d) => {
              const m = DOC_STATUS_MAP[d.status];
              return (
                <div key={d.id} style={{ display: 'grid', gridTemplateColumns: '1fr 160px 200px 120px 120px', padding: '16px 24px', borderBottom: '1px solid #131e33', alignItems: 'center' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>

                    <div style={{ fontSize: 14, fontWeight: 600 }}>{d.name}</div>
                  </div>
                  <div style={{ fontSize: 13, color: '#c4ccdc' }}>{d.owner}</div>
                  <div><span className={`pill ${m.pill}`}><span className={`dot ${m.dot}`} /> {d.statusLabel}</span></div>
                  <div className="mono" style={{ fontSize: 12, color: '#8892a8' }}>{d.updated}</div>
                  <div>{d.action && <button className="btn btn-accent btn-sm" onClick={() => toast && toast(`${d.name}: открыто для заполнения`)}>{d.action}</button>}</div>

            })}
          </React.Fragment>);

      })}
    </div>);

}

function StudentChat({ toast }) {
  const [active, setActive] = useStateS(CHAT_THREADS[0].id);

  const thread = threads.find((t) => t.id === active);

  const send = () => {
    if (!text.trim()) return;
    setThreads(threads.map((t) => t.id === active ? {
      ...t,
      messages: [...t.messages, { from: 'me', text, at: 'сейчас' }]

function MentorChat({ toast }) {
  const [active, setActive] = useStateM(MENTOR_CHAT_THREADS[0].id);
  const [text, setText] = useStateM('');
  const [threads, setThreads] = useStateM(MENTOR_CHAT_THREADS);
  const thread = threads.find((t) => t.id === active);

  const send = () => {
    if (!text.trim()) return;
    setThreads(threads.map((t) => t.id === active ? {
      ...t,
      unread: 0,
      messages: [...t.messages, { from: 'me', text, at: 'сейчас' }]
    } : t));
    setText('');
    toast('Сообщение отправлено');
  };

  const totalUnread = threads.reduce((s, t) => s + t.unread, 0);

  return (
    <div className="anim-in" style={{ maxWidth: 1320, margin: '0 auto', padding: '32px 32px' }}>
      <div style={{ marginBottom: 24 }}>
        <div className="mono" style={{ fontSize: 11, letterSpacing: '0.16em', color: '#ff7a1a', marginBottom: 10, fontWeight: 600, textTransform: 'uppercase' }}>Наставник</div>
        <h1 className="display tight" style={{ fontSize: 'clamp(30px, 4vw, 44px)', lineHeight: 0.95, margin: '0 0 6px' }}>ЧАТЫ</h1>
        {totalUnread > 0 && <div style={{ fontSize: 13, color: '#8892a8' }}>{totalUnread} непрочитанных сообщения</div>}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '320px 1fr', gap: 20, height: '70vh', minHeight: 540 }}>
        {/* Thread list */}
        <div className="card" style={{ padding: 0, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          <div style={{ padding: 16, borderBottom: '1px solid #1a2438' }}>
            <input className="input" placeholder="Поиск" style={{ fontSize: 13 }} />
          </div>
          <div style={{ flex: 1, overflowY: 'auto' }}>
            {threads.map((t) =>
            <div key={t.id} onClick={() => setActive(t.id)} style={{
              padding: 16,
              borderBottom: '1px solid #131e33',
              cursor: 'pointer',
              background: active === t.id ? 'rgba(255,122,26,0.08)' : 'transparent',
              borderLeft: active === t.id ? '3px solid #ff7a1a' : '3px solid transparent',
              display: 'flex', gap: 12, alignItems: 'flex-start'
            }}>
                <Avatar initials={t.with.avatar} size={40} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', gap: 8, marginBottom: 2 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{t.with.name}</div>
                    <div className="mono" style={{ fontSize: 10, color: '#8892a8', flexShrink: 0 }}>{t.lastAt}</div>
                  </div>
                  {t.project && <div style={{ fontSize: 11, color: '#8892a8', marginBottom: 4, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{t.project}</div>}
                  <div style={{ fontSize: 12, color: '#c4ccdc', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{t.messages[t.messages.length - 1].text}</div>
                </div>
                {t.unread > 0 && <div style={{ background: '#ff7a1a', color: '#fff', fontSize: 10, fontWeight: 800, padding: '2px 7px', borderRadius: 999, flexShrink: 0 }}>{t.unread}</div>}
              </div>
            )}
          </div>
        </div>

        {/* Active thread */}
        <div className="card" style={{ padding: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          <div style={{ padding: '16px 22px', borderBottom: '1px solid #1a2438', display: 'flex', alignItems: 'center', gap: 12 }}>
            <Avatar initials={thread.with.avatar} size={42} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 700 }}>{thread.with.name}</div>
              <div style={{ fontSize: 12, color: '#8892a8' }}>{thread.with.role}{thread.project ? ` ${thread.project}` : ''}</div>
            </div>
            {thread.with.role.startsWith('Студент') &&
            <button className="btn btn-ghost btn-sm" onClick={() => toast('Профиль кандидата открыт')}>Профиль</button>
            }
          </div>

          <div style={{ flex: 1, overflowY: 'auto', padding: 22, display: 'flex', flexDirection: 'column', gap: 12 }}>
            {thread.messages.map((m, i) =>
            <div key={i} style={{
              alignSelf: m.from === 'me' ? 'flex-end' : 'flex-start',
              maxWidth: '70%',
              background: m.from === 'me' ? 'linear-gradient(180deg,#ffa24a,#ff7a1a)' : '#131e33',
              color: m.from === 'me' ? '#fff' : '#eef2f9',
              padding: '10px 14px',
              borderRadius: m.from === 'me' ? '16px 16px 4px 16px' : '16px 16px 16px 4px',
              fontSize: 13, lineHeight: 1.5,
              boxShadow: m.from === 'me' ? '0 4px 20px rgba(255,122,26,0.3)' : 'none'
            }}>
                <div>{m.text}</div>
                <div className="mono" style={{ fontSize: 9, opacity: 0.6, marginTop: 4, textAlign: 'right' }}>{m.at}</div>
              </div>
            )}
          </div>

          <div style={{ padding: 16, borderTop: '1px solid #1a2438', display: 'flex', gap: 10 }}>
            <input className="input" value={text} onChange={(e) => setText(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && send()} placeholder="Написать сообщение… (Enter)" />
            <button className="btn btn-accent" onClick={send}>↗</button>
          </div>
        </div>
      </div>
    </div>);

}

function CoordinatorChat({ toast }) {

    if (!text.trim()) return;
    setThreads(threads.map((t) => t.id === active ? {
      ...t, unread: 0,
      messages: [...t.messages, { from: 'me', text, at: new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }) }]
    } : t));
    setText('');
    toast('Сообщение отправлено');

    <div className="anim-in" style={{ maxWidth: 1320, margin: '0 auto', padding: '32px 32px' }}>

              </div>

          </div>
        </div>
        <div className="card" style={{ padding: 0, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          <div style={{ padding: '16px 24px', borderBottom: '1px solid #1a2438', display: 'flex', alignItems: 'center', gap: 14 }}>

            </div>
          </div>

              </div>
            )}
          </div>

            value={text} onChange={(e) => setText(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && send()} />

// ========== src/app.jsx ==========
// App shell + router + Tweaks

const { useState: useStateA, useEffect: useEffectA } = React;

const SCREENS_BY_ROLE = {
  student: [
  { key: 'home', label: 'Главная' },
  { key: 'match', label: 'Проекты' },
  { key: 'applications', label: 'Мои заявки' },
  { key: 'documents', label: 'Документы' },
  { key: 'chat', label: 'Чат', badge: 1 },
  { key: 'profile', label: 'Профиль' }],

  mentor: [
  { key: 'home', label: 'Обзор' },
  { key: 'candidates', label: 'Кандидаты', badge: 2 },
  { key: 'project', label: 'Проект' },
  { key: 'mentor-docs', label: 'Документы' },
  { key: 'mentor-chat', label: 'Чаты', badge: 3 }],

  coordinator: [
  { key: 'home', label: 'Дашборд' },
  { key: 'coord-students', label: 'Студенты' },
  { key: 'coord-projects', label: 'Проекты' },
  { key: 'coord-docs', label: 'Документы' },
  { key: 'coord-chat', label: 'Чат', badge: 2 }]

};

function TweaksPanel({ open, onClose }) {
  const [t, setT] = useStateA(window.TWEAKS);
  if (!open) return null;
  const set = (k, v) => {
    const next = { ...t, [k]: v };
    setT(next);
    window.TWEAKS = next;
    document.documentElement.style.setProperty('--accent', next.accent);
    document.documentElement.style.setProperty('--glow', String(next.accentGlow));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
    window.dispatchEvent(new Event('tweaks-changed'));
  };
  return (
    <div className="tweaks-panel">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
        <h3 style={{ margin: 0 }}>Tweaks</h3>
        <button className="btn btn-ghost btn-sm" onClick={onClose} style={{ padding: '4px 10px' }}>✕</button>
      </div>
      <div className="row">
        <label>
          <span>Акцентный цвет</span>
          <input type="color" value={t.accent} onChange={(e) => set('accent', e.target.value)} />
        </label>
      </div>
      <div className="row">
        <label>
          <span>Яркость свечения</span>
          <input type="range" min="0" max="1.5" step="0.1" value={t.accentGlow} onChange={(e) => set('accentGlow', parseFloat(e.target.value))} />
        </label>
      </div>
      <div className="row">
        <label>
          <span>Огненный hero</span>
          <input type="checkbox" checked={t.showHeroFlame} onChange={(e) => set('showHeroFlame', e.target.checked)} />
        </label>
      </div>
      <div className="row">
        <label>
          <span>Интенсивность hero</span>
          <input type="range" min="0.3" max="1.3" step="0.1" value={t.heroIntensity} onChange={(e) => set('heroIntensity', parseFloat(e.target.value))} />
        </label>
      </div>
      <div className="row">
        <label>
          <span>Объяснимость ИИ</span>
          <input type="checkbox" checked={t.showExplainability} onChange={(e) => set('showExplainability', e.target.checked)} />
        </label>
      </div>
      <div className="row" style={{ marginTop: 14, paddingTop: 14, borderTop: '1px solid #2a3652' }}>
        <div style={{ fontSize: 10, color: '#8892a8', lineHeight: 1.5 }}>
          Панель скрывается при выключении Tweaks. Изменения сохраняются в файле.
        </div>
      </div>
    </div>);

}

function App() {
  const [role, setRole] = useStateA(() => localStorage.getItem('mvp-role') || window.TWEAKS.role || 'student');
  const [screen, setScreen] = useStateA(() => localStorage.getItem('mvp-screen') || 'home');
  const [toastMsg, setToastMsg] = useStateA(null);
  const [tweaksOpen, setTweaksOpen] = useStateA(false);

  useEffectA(() => {localStorage.setItem('mvp-role', role);}, [role]);
  useEffectA(() => {localStorage.setItem('mvp-screen', screen);}, [screen]);

  // Tweaks edit-mode protocol
  useEffectA(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Apply initial tweaks to CSS vars
  useEffectA(() => {
    document.documentElement.style.setProperty('--accent', window.TWEAKS.accent);
    document.documentElement.style.setProperty('--glow', String(window.TWEAKS.accentGlow));
  }, []);

  const changeRole = (r) => {setRole(r);setScreen('home');};
  const toast = (m) => setToastMsg(m);

  const screens = SCREENS_BY_ROLE[role];

  let content;
  if (role === 'student') {
    if (screen === 'home') content = <StudentHome onNav={setScreen} toast={toast} />;else
    if (screen === 'match') content = <StudentMatch toast={toast} />;else
    if (screen === 'applications') content = <StudentApplications />;else
    if (screen === 'documents') content = <StudentDocuments />;else
    if (screen === 'chat') content = <StudentChat toast={toast} />;else
    if (screen === 'profile') content = <StudentProfile toast={toast} />;
  } else if (role === 'mentor') {
    if (screen === 'home') content = <MentorDashboard onNav={setScreen} toast={toast} />;else
    if (screen === 'candidates') content = <MentorCandidates toast={toast} />;else
    if (screen === 'project') content = <MentorProject toast={toast} />;else
    if (screen === 'mentor-docs') content = <MentorDocuments toast={toast} />;else
    if (screen === 'mentor-chat') content = <MentorChat toast={toast} />;
  } else {
    if (screen === 'home') content = <CoordinatorDashboard toast={toast} />;else
    if (screen === 'coord-students') content = <CoordinatorStudents toast={toast} />;else
    if (screen === 'coord-projects') content = <CoordinatorProjects toast={toast} />;else
    if (screen === 'coord-docs') content = <CoordinatorDocs toast={toast} />;else
    if (screen === 'coord-chat') content = <CoordinatorChat toast={toast} />;
  }

  return (
    <div data-screen-label={`${role}-${screen}`}>
      <TopBar role={role} onRole={changeRole} screen={screen} onScreen={setScreen} screens={screens} />
      <main>{content}</main>

      {/* Footer */}
      <footer style={{ borderTop: '1px solid #1a2438', marginTop: 80, padding: '32px', color: '#5a6278', fontSize: 12 }}>
        <div style={{ maxWidth: 1320, margin: '0 auto', display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 20 }}>
          <div>© 2026 MVP цифровой платформы организации практик ИТМО × ПАО «Газпром нефть» Сделано Анастасией Дехтеревой, ФТМИ ИТМО</div>
          <div className="mono" style={{ letterSpacing: '0.08em' }}>v0.4.1 демо‑прототип</div>
        </div>
      </footer>

      <TweaksPanel open={tweaksOpen} onClose={() => {setTweaksOpen(false);window.parent.postMessage({ type: '__edit_mode_available' }, '*');}} />
      <Toast message={toastMsg} onDone={() => setToastMsg(null)} />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
